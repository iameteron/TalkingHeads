<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action expert | TalkingHeads Prompts</title>
  <link rel="stylesheet" href="assets/prompts.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
  <script src="assets/prompts.js" defer></script>
</head>
<body>
  <div id="prompt-root">
    <p class="crumb"><a href="../index.html">Home</a> / <a href="env-agent.html">Prompts</a> / <a href="operator-agent.html">Operator Agent</a> / Action expert</p>
    <p class="page-kicker">Operator Agent</p>
    <h1>Action expert</h1>
    <div class="meta-row">
      <span class="chip">oracle / action_prompt</span>
      <span class="chip">Action preconditions expert</span>
    </div>
    <div class="prompt-view">
      <div class="prompt-view-bar">
        <span>content/action-expert.md</span>
        <button type="button" id="copyPromptBtn">Copy</button>
      </div>
      <div id="promptMarkdown"></div>
    </div>

  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      TalkingHeadsPrompts.mountChrome("action-expert");
      TalkingHeadsPrompts.loadPromptMarkdown("content/action-expert.md");
      TalkingHeadsPrompts.bindCopyButton();
    });
  </script>
</body>
</html>
